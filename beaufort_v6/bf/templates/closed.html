{% extends "base.html" %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div>
    <div style="font-size:4rem;margin-bottom:1.5rem;animation:float 3s ease-in-out infinite">🔒</div>
    <div style="display:inline-block;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);color:var(--rd);border-radius:999px;padding:4px 16px;font-size:0.78rem;font-weight:600;margin-bottom:1.5rem;letter-spacing:.5px;text-transform:uppercase;">Site fermé</div>
    <h1 style="font-family:'DM Serif Display',serif;font-size:2.5rem;margin-bottom:.75rem;">Accès restreint</h1>
    <p style="color:var(--t2);max-width:400px;margin:0 auto;">{{ msg }}</p>
  </div>
</div>
{% endblock %}

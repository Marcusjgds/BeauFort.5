{% extends "base.html" %}
{% block title %}Admin — {{ site_name }}{% endblock %}
{% block extra_style %}
<style>
.al-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.al-card{background:var(--s1);border:1px solid var(--ln);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;}
h1{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:.4rem;}
.sub{color:var(--t2);font-size:0.85rem;margin-bottom:2rem;}
label{display:block;font-size:0.72rem;font-weight:500;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
input{width:100%;background:var(--s2);border:1px solid var(--ln2);border-radius:8px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:0.92rem;padding:11px 14px;outline:none;margin-bottom:1rem;}
input:focus{border-color:var(--ac);}
.err{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);border-radius:8px;padding:10px 14px;color:var(--rd);font-size:0.82rem;margin-bottom:1rem;}
.back{display:block;text-align:center;margin-top:1rem;color:var(--t2);font-size:0.82rem;text-decoration:none;}
.back:hover{color:var(--ac);}
</style>
{% endblock %}
{% block content %}
<div class="al-wrap">
  <div class="al-card anim-up">
    <h1>🔐 Admin</h1>
    <p class="sub">{{ site_name }}</p>
    <form method="POST" action="/admin">
      <label>Mot de passe admin</label>
      <input type="password" name="password" placeholder="••••••••" autofocus>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
      <button type="submit" class="btn btn-ac" style="width:100%;justify-content:center;padding:12px;">Accéder</button>
    </form>
    <a href="/" class="back">← Retour au site</a>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Connexion — {{ s.site_name }}{% endblock %}
{% block extra_css %}
<style>
.login-wrap{min-height:calc(100vh - 130px);display:flex;align-items:center;justify-content:center;padding:2rem;}
.login-card{background:var(--s1);border:1px solid var(--ln);border-radius:16px;padding:2.5rem;width:100%;max-width:390px;}
.login-top{text-align:center;margin-bottom:2rem;}
.login-logo{width:64px;height:64px;border-radius:12px;object-fit:cover;margin-bottom:1rem;border:1px solid var(--ln2);}
.login-title{font-family:'DM Serif Display',serif;font-size:1.6rem;letter-spacing:-0.5px;margin-bottom:.3rem;}
.login-sub{color:var(--tx2);font-size:0.85rem;}
.err-box{background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.2);border-radius:8px;padding:10px 14px;color:var(--rd);font-size:0.82rem;margin-bottom:1rem;}
</style>
{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card anim-up">
    <div class="login-top">
      {% if s.site_logo %}<img src="/uploads/logos/{{ s.site_logo }}" class="login-logo">
      {% else %}<img src="/static/logo.png" class="login-logo">{% endif %}
      <div class="login-title">Connexion</div>
      <div class="login-sub">Accède à ta plateforme</div>
    </div>
    {% if error %}<div class="err-box">⚠️ {{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="fg"><label class="lbl">Pseudo</label><input class="inp" type="text" name="username" placeholder="Ton pseudo" required autofocus></div>
      <div class="fg"><label class="lbl">Mot de passe</label><input class="inp" type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn btn-ac" style="width:100%;justify-content:center;padding:11px">Se connecter →</button>
    </form>
  </div>
</div>
{% endblock %}
